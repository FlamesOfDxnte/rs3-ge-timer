<body>

    <h1>GE Offer Tracker</h1>
    
    <div class="controls">
        <div class="row">
            <input type="text" id="itemName" placeholder="Item Name (e.g., Praesul wand)">
        </div>
        <div class="row">
            <select id="slotSelect"></select> 
            <select id="typeSelect">
                <option value="buy">Buying</option>
                <option value="sell">Selling</option>
            </select>
            <button onclick="startTracker()">Track</button>
        </div>
    </div>

    <div class="global-actions">
        <button class="reset-all-btn" onclick="resetAllSlots()">Reset All Slots</button>
        <div id="updateBanner" class="update-banner" onclick="window.location.reload()">✨ Update Available! Click to Reload</div>
    </div>

    <div class="slots-container" id="slotsContainer"></div>

    <script>
        const APP_VERSION = "1.1.0"; 
        let activeOffers = JSON.parse(localStorage.getItem('rs3_alt1_ge_timers')) || {};

        if (window.alt1) {
            alt1.identifyAppUrl("ge_timer");
        }

        const slotSelect = document.getElementById('slotSelect');
        for (let i = 1; i <= 8; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = `Slot ${i}`;
            slotSelect.appendChild(opt);
        }

        function checkForUpdates() {
            const currentUrl = window.location.href;
            if (currentUrl.includes("github.io")) {
                fetch(currentUrl)
                    .then(response => response.text())
                    .then(html => {
                        const match = html.match(/const APP_VERSION = "([^"]+)"/);
                        if (match && match !== APP_VERSION) {
                            document.getElementById('updateBanner').style.display = 'block';
                        }
                    })
                    .catch(err => console.log("Update check skipped"));
            }
        }

        function playLimitAlarm() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc1 = audioCtx.createOscillator();
                let gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                gain1.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start();
                osc1.stop(audioCtx.currentTime + 0.4);

                setTimeout(() => {
                    let osc2 = audioCtx.createOscillator();
                    let gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(880.00, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.5);
                }, 150);
            } catch(e) {}
        }

        function renderSlots() {
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const offer = activeOffers[i];
                const card = document.createElement('div');
                card.className = 'slot-card';
                if (offer) {
                    card.classList.add(offer.type === 'buy' ? 'active-buy' : 'active-sell');
                    card.innerHTML = `
                        <div class="slot-info">
                            <span class="slot-title">Slot ${i} · ${offer.type}</span>
                            <span class="item-name" title="${offer.itemName}">${offer.itemName}</span>
                        </div>
                        <div class="timer-side">
                            <div class="timer-display" id="timer-${i}">00:00:00</div>
                            <button class="clear-btn" onclick="clearSlot(${i})">Remove</button>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="slot-info"><span class="slot-title">Slot ${i}</span><span class="empty-text">Empty Slot</span></div>
                    `;
                }
                container.appendChild(card);
            }
        }

        function startTracker() {
            const slot = slotSelect.value;
            const itemName = document.getElementById('itemName').value.trim() || "Unknown Item";
            const type = document.getElementById('typeSelect').value;
            activeOffers[slot] = {
                itemName: itemName,
                type: type,
                startTime: new Date().getTime(),
                alarmTriggered: false
            };
            localStorage.setItem('rs3_alt1_ge_timers', JSON.stringify(activeOffers));
            document.getElementById('itemName').value = '';
            renderSlots();
        }

        function clearSlot(slotId) {
            delete activeOffers[slotId];
            localStorage.setItem('rs3_alt1_ge_timers', JSON.stringify(activeOffers));
            renderSlots();
        }

        function resetAllSlots() {
            if (confirm("Are you sure you want to clear all 8 tracking slots?")) {
                activeOffers = {};
                localStorage.setItem('rs3_alt1_ge_timers', JSON.stringify(activeOffers));
                renderSlots();
            }
        }

        function updateTimers() {
            const now = new Date().getTime();
            let stateChanged = false;
            for (let i = 1; i <= 8; i++) {
                const offer = activeOffers[i];
                if (offer) {
                    const diff = now - offer.startTime;
                    const hours = Math.floor(diff / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    const displayStr = String(hours).padStart(2, '0') + ':' + String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');
                    const timerEl = document.getElementById(`timer-${i}`);
                    if (timerEl) {
                        timerEl.innerText = displayStr;
                        if (hours >= 4) {
                            timerEl.style.color = '#ff5722'; 
                            if (!offer.alarmTriggered) {
                                playLimitAlarm();
                                activeOffers[i].alarmTriggered = true;
                                stateChanged = true;
                            }
                        } else {
                            timerEl.style.color = '#ffeb3b';
                        }
                    }
                }
            }
            if (stateChanged) localStorage.setItem('rs3_alt1_ge_timers', JSON.stringify(activeOffers));
        }

        renderSlots();
        setInterval(updateTimers, 1000);
        setTimeout(checkForUpdates, 3000);
    </script>
</body>
</html>
