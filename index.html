<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alt1 GE Tracker</title>
    <!-- Include the official Alt1 API library -->
    <script type="text/javascript" src="https://runeapps.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #161616;
            color: #dcdcdc;
            margin: 0;
            padding: 10px;
            font-size: 13px;
            /* Slim width optimized for Alt1's sidebar panels */
            max-width: 320px; 
            user-select: none;
        }
        h1 {
            color: #ff9800;
            text-align: center;
            font-size: 16px;
            margin: 5px 0 12px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .controls {
            background-color: #222;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 12px;
            border: 1px solid #3c3c3c;
        }
        .row {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }
        .row:last-child {
            margin-bottom: 0;
        }
        select, input, button {
            padding: 6px;
            border-radius: 3px;
            border: 1px solid #444;
            background-color: #2e2e2e;
            color: #fff;
            font-size: 12px;
            box-sizing: border-box;
        }
        input { flex: 1; }
        select { width: 85px; }
        button {
            background-color: #ff9800;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
            flex: 1;
        }
        button:hover { background-color: #e68a00; }
        
        /* Compact Vertical List Layout for Alt1 Sidebar */
        .slots-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .slot-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }
        .slot-card.active-buy { border-left: 4px solid #4caf50; }
        .slot-card.active-sell { border-left: 4px solid #f44336; }
        
        .slot-info {
            display: flex;
            flex-direction: column;
            max-width: 55%;
        }
        .slot-title {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }
        .item-name {
            font-size: 13px;
            color: #fff;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .timer-side {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .timer-display {
            font-size: 16px;
            font-family: monospace;
            color: #ffeb3b;
            font-weight: bold;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #777;
            font-size: 10px;
            padding: 2px 0 0 0;
            cursor: pointer;
            text-decoration: underline;
        }
        .clear-btn:hover { color: #f44336; }
        .empty-text {
            color: #555;
            font-style: italic;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h1>GE Offer Tracker</h1>
    
    <div class="controls">
        <div class="row">
            <input type="text" id="itemName" placeholder="Item Name (e.g., Bow of the Last Guardian)">
        </div>
        <div class="row">
            <select id="slotSelect"></select> <!-- Populated via JS -->
            <select id="typeSelect">
                <option value="buy">Buying</option>
                <option value="sell">Selling</option>
            </select>
            <button onclick="startTracker()">Track</button>
        </div>
    </div>

    <div class="slots-container" id="slotsContainer"></div>

    <script>
        let activeOffers = JSON.parse(localStorage.getItem('rs3_alt1_ge_timers')) || {};

        // Alt1 Integration: Identify the app context
        if (window.alt1) {
            alt1.identifyAppUrl("ge_timer");
        }

        // Dynamically build slot dropdown
        const slotSelect = document.getElementById('slotSelect');
        for (let i = 1; i <= 8; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = `Slot ${i}`;
            slotSelect.appendChild(opt);
        }

        function renderSlots() {
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '';
            
            for (let i = 1; i <= 8; i++) {
                const offer = activeOffers[i];
                const card = document.createElement('div');
                card.className = 'slot-card';
                
                if (offer) {
                    card.classList.add(offer.type === 'buy' ? 'active-buy' : 'active-sell');
                    card.innerHTML = `
                        <div class="slot-info">
                            <span class="slot-title">Slot ${i} · ${offer.type}</span>
                            <span class="item-name" title="${offer.itemName}">${offer.itemName}</span>
                        </div>
                        <div class="timer-side">
                            <div class="timer-display" id="timer-${i}">00:00:00</div>
                            <button class="clear-btn" onclick="clearSlot(${i})">Remove</button>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="slot-info"><span class="slot-title">Slot ${i}</span><span class="empty-text">Empty</span></div>
                    `;
                }
                container.appendChild(card);
            }
        }

        function startTracker() {
            const slot = slotSelect.value;
            const itemName = document.getElementById('itemName').value.trim() || "Unknown Item";
            const type = document.getElementById('typeSelect').value;
            
            activeOffers[slot] = {
                itemName: itemName,
                type: type,
                startTime: new Date().getTime()
            };
            
            localStorage.setItem('rs3_alt1_ge_timers', JSON.stringify(activeOffers));
            document.getElementById('itemName').value = '';
            renderSlots();
        }

        function clearSlot(slotId) {
            delete activeOffers[slotId];
            localStorage.setItem('rs3_alt1_ge_timers', JSON.stringify(activeOffers));
            renderSlots();
        }

        function updateTimers() {
            const now = new Date().getTime();
            for (let i = 1; i <= 8; i++) {
                const offer = activeOffers[i];
                if (offer) {
                    const diff = now - offer.startTime;
                    const hours = Math.floor(diff / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    
                    const displayStr = 
                        String(hours).padStart(2, '0') + ':' + 
                        String(minutes).padStart(2, '0') + ':' + 
                        String(seconds).padStart(2, '0');
                        
                    const timerEl = document.getElementById(`timer-${i}`);
                    if (timerEl) {
                        timerEl.innerText = displayStr;
                        if (hours >= 4) {
                            timerEl.style.color = '#ff5722'; // Visual alert over 4 hours
                        } else {
                            timerEl.style.color = '#ffeb3b';
                        }
                    }
                }
            }
        }

        renderSlots();
        setInterval(updateTimers, 1000);
    </script>
</body>
</html>
