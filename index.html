<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alt1 GE Tracker - Master Edition</title>
    <script type="text/javascript" src="https://runeapps.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #161616;
            color: #dcdcdc;
            margin: 0;
            padding: 6px;
            font-size: 12px;
            max-width: 320px; 
            user-select: none;
            overflow: hidden;
        }
        h1 {
            color: #ff9800;
            text-align: center;
            font-size: 14px;
            margin: 2px 0 6px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }
        .controls {
            background-color: #222;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 6px;
            border: 1px solid #3c3c3c;
        }
        .row {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        .row:last-child { margin-bottom: 0; }
        select, input, button {
            padding: 5px;
            border-radius: 3px;
            border: 1px solid #444;
            background-color: #2e2e2e;
            color: #fff;
            font-size: 12px;
            box-sizing: border-box;
        }
        input { flex: 1; }
        select { width: 80px; }
        button {
            background-color: #ff9800;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            border: none;
            flex: 1;
        }
        button:hover { background-color: #e68a00; }
        .global-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 2px;
        }
        .reset-all-btn {
            background-color: #3a1c1c;
            color: #ff9999;
            border: 1px solid #6b2a2a;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
        }
        .reset-all-btn:hover {
            background-color: #5c1e1e;
            color: #fff;
        }
        .slots-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .slot-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            height: 31px; 
            box-sizing: border-box;
        }
        .slot-card.active-buy { border-left: 4px solid #4caf50; }
        .slot-card.active-sell { border-left: 4px solid #f44336; }
        .slot-info {
            display: flex;
            flex-direction: column;
            max-width: 55%;
        }
        .slot-title {
            font-size: 9px;
            color: #888;
            text-transform: uppercase;
            line-height: 11px;
        }
        .item-name {
            font-size: 12px;
            color: #fff;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 14px;
        }
        .timer-side {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            justify-content: center;
        }
        .timer-display {
            font-size: 14px;
            font-family: monospace;
            color: #ffeb3b;
            font-weight: bold;
            line-height: 14px;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #777;
            font-size: 9px;
            padding: 0;
            margin: 0;
            cursor: pointer;
            text-decoration: underline;
            line-height: 11px;
        }
        .clear-btn:hover { color: #f44336; }
        .empty-text {
            color: #444;
            font-style: italic;
            font-size: 11px;
            line-height: 14px;
        }
    </style>
</head>
<body>

    <h1>GE Offer Tracker</h1>
    
    <div class="controls">
        <div class="row">
            <input type="text" id="itemName" placeholder="Item Name (e.g., Praesul wand)">
        </div>
        <div class="row">
            <select id="slotSelect"></select> 
            <select id="typeSelect">
                <option value="buy">Buying</option>
                <option value="sell">Selling</option>
            </select>
            <button onclick="startTracker()">Track</button>
        </div>
    </div>

    <div class="global-actions">
        <button class="reset-all-btn" onclick="resetAllSlots()">Reset All Slots</button>
    </div>

    <div class="slots-container" id="slotsContainer"></div>

    <script>
        // Check if data is missing, blank, or broken and force an empty object
        let rawData = localStorage.getItem('rs3_alt1_ge_timers');
        let activeOffers = {};
        try {
            if (rawData && rawData.trim() !== "" && rawData !== "undefined") {
                activeOffers = JSON.parse(rawData);
            }
        } catch(e) {
            activeOffers = {};
        }

        if (window.alt1) {
            alt1.identifyAppUrl("ge_timer");
        }

        const slotSelect = document.getElementById('slotSelect');
        for (let i = 1; i <= 8; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.innerHTML = `Slot ${i}`;
            slotSelect.appendChild(opt);
        }

        function playLimitAlarm() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                let osc1 = audioCtx.createOscillator();
                let gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(587.33, audioCtx.currentTime);
                gain1.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start();
                osc1.stop(audioCtx.currentTime + 0.4);

                setTimeout(() => {
                    let osc2 = audioCtx.createOscillator();
                    let gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(880.00, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.5);
                }, 150);
            } catch(e) {}
        }

        function renderSlots() {
            const container = document.getElementById('slotsContainer');
            container.innerHTML = '';
            for (let i = 1; i <= 8; i++) {
                const offer = activeOffers[i];
                const card = document.createElement('div');
                card.className = 'slot-card';
                if (offer && offer.itemName) {
                    card.classList.add(offer.type === 'buy' ? 'active-buy' : 'active-sell');
                    card.innerHTML = `
                        <div class="slot-info">
                            <span class="slot-title">Slot ${i} · ${offer.type}</span>
                            <span class="item-name" title="${offer.itemName}">${offer.itemName}</span>
                        </div>
                        <div class="timer-side">
                            <div class="timer-display" id="timer-${i}">00:00:00</div>
                            <button class="clear-btn" onclick="clearSlot(${i})">Remove</button>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="slot-info"><span class="slot-title">Slot ${i}</span><span class="empty-text">Empty Slot</span></div>
                    `;
                }
                container.appendChild(card);
            }
        }

        function startTracker() {
            const slot = slotSelect.value;
            const itemName = document.getElementById('itemName').value.trim() || "Unknown Item";
            const type = document.getElementById('typeSelect').value;
            activeOffers[slot] = {
                itemName: itemName,
                type: type,
                startTime: new Date().getTime(),
                alarmTriggered: false
            };
            localStorage.setItem('rs3_alt1_ge_timers', JSON.stringify(activeOffers));
            document.getElementById('itemName').value = '';
            renderSlots();
        }

        function clearSlot(slotId) {
            delete activeOffers[slotId];
            localStorage.setItem('rs3_alt1_ge_timers', JSON.stringify(activeOffers));
            renderSlots();
        }

        function resetAllSlots() {
            // Confirmation alert removed because Alt1 environments block browser pop-ups
            activeOffers = {};
            localStorage.setItem('rs3_alt1_ge_timers', JSON.stringify(activeOffers));
            renderSlots();
        }

        function updateTimers() {
            const now = new Date().getTime();
            let stateChanged = false;
